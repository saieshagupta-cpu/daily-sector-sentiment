# NEW NAMES candidate pool — under-the-radar mid + small caps in each sector.
# These are NOT the household megacaps; they're names the strength scorer can
# surface as "rising stocks worth adding to a portfolio".
#
# Curation rules:
# - US-listed (no delisted/acquired names — verified live as of pull)
# - Mostly market cap $1B – $30B (mid + small)
# - NOT in the BIG NAMES list (config/universe.yaml)
# - Sector-pure: each name's primary business fits the sector
# - Mix of subsector exposures so daily rotation has room to pick winners

